  <!-- Left: taglines -->
  <text x="72" y="424" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#6b6b65" letter-spacing="2">Digital Marketing</text>
  <text x="72" y="448" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#6b6b65" letter-spacing="2">Antiques &amp; Collectibles</text>

  <!-- Left: company name JP -->
  <text x="72" y="534" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif" font-size="14" fill="#6b6b65" letter-spacing="6">宗株式会社</text>

  <!-- Right: 宗 kanji large -->
  <text x="860" y="468" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', 'MS Mincho', serif" font-size="300" font-weight="300" fill="#1a1a18" text-anchor="middle">宗</text>
